<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropoly - Game Room</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .room-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .room-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .room-title {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .room-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .room-code {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }

        .player-count {
            color: #666;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .copy-btn:hover {
            background: #5a6fd8;
        }

        .players-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .player-card.ready {
            border-color: #28a745;
            background: #d4edda;
        }

        .player-card.waiting {
            border-color: #ffc107;
            background: #fff3cd;
        }

        .player-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .player-status {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
        }

        .token-selection {
            margin-top: 20px;
        }

        .token-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .token-option {
            width: 60px;
            height: 60px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            transition: all 0.3s ease;
            background: white;
        }

        .token-option:hover {
            border-color: #667eea;
            transform: scale(1.1);
        }

        .token-option.selected {
            border-color: #28a745;
            background: #d4edda;
        }

        .token-option.taken {
            border-color: #dc3545;
            background: #f8d7da;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .game-controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .leave-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .leave-btn:hover {
            background: #c82333;
        }

        .chat-section {
            margin-top: 30px;
            border-top: 1px solid #e9ecef;
            padding-top: 20px;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
            background: white;
            margin-bottom: 10px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e9ecef;
            border-radius: 5px;
        }

        .chat-input button {
            padding: 10px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="leave-btn" onclick="leaveRoom()">Leave Room</button>
    
    <div class="room-container">
        <div class="room-header">
            <h1 class="room-title">Game Room</h1>
        </div>

        <div class="room-info">
            <div>
                <span class="room-code">Room: <span id="room-code">Loading...</span></span>
                <button class="copy-btn" onclick="copyRoomCode()">Copy Code</button>
            </div>
            <div class="player-count">
                Players: <span id="player-count">0/8</span>
            </div>
        </div>

        <div class="players-section">
            <h2 class="section-title">Players</h2>
            <div id="players-grid" class="players-grid">
                <div class="status-message status-info">Loading players...</div>
            </div>
        </div>

        <div id="token-selection" class="token-selection hidden">
            <h3>Select Your Token</h3>
            <div class="token-grid">
                <div class="token-option" data-token="🚗" onclick="selectToken('🚗')">🚗</div>
                <div class="token-option" data-token="🏠" onclick="selectToken('🏠')">🏠</div>
                <div class="token-option" data-token="🐕" onclick="selectToken('🐕')">🐕</div>
                <div class="token-option" data-token="🚢" onclick="selectToken('🚢')">🚢</div>
                <div class="token-option" data-token="🎩" onclick="selectToken('🎩')">🎩</div>
                <div class="token-option" data-token="👞" onclick="selectToken('👞')">👞</div>
                <div class="token-option" data-token="🏈" onclick="selectToken('🏈')">🏈</div>
                <div class="token-option" data-token="🍔" onclick="selectToken('🍔')">🍔</div>
            </div>
        </div>

        <div class="game-controls">
            <button id="start-game-btn" class="btn btn-primary hidden" onclick="startGame()">
                <span id="start-btn-text">Start Game</span>
                <span id="start-loading" class="loading hidden"></span>
            </button>
            <button id="begin-game-btn" class="btn btn-primary hidden" onclick="beginGame()">
                <span id="begin-btn-text">Begin Game</span>
                <span id="begin-loading" class="loading hidden"></span>
            </button>
        </div>

        <div class="chat-section">
            <h3>Chat</h3>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>

        <div id="status-message"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // Configuration
        const SERVER_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://metropoly-backend.onrender.com';

        // Global variables
        let socket = null;
        let currentPlayerName = '';
        let currentRoomId = '';
        let selectedToken = null;
        let isHost = false;
        let players = [];
        let allTokensSelected = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            currentRoomId = urlParams.get('roomId');
            currentPlayerName = urlParams.get('playerName');

            if (!currentRoomId || !currentPlayerName) {
                showStatus('Invalid room or player information', 'error');
                setTimeout(() => {
                    window.location.href = 'lobby.html';
                }, 3000);
                return;
            }

            document.getElementById('room-code').textContent = currentRoomId;
            initializeSocket();
        });

        function initializeSocket() {
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                console.log('Connected to server');
                showStatus('Connected to server', 'success');
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                showStatus('Disconnected from server', 'error');
            });

            socket.on('game-starting', (data) => {
                console.log('Game starting:', data);
                players = data.players;
                updatePlayersDisplay();
                showTokenSelection();
            });

            socket.on('token-selected', (data) => {
                console.log('Token selected:', data);
                updateTokenSelection(data.playerId, data.token);
                updatePlayersDisplay();
            });

            socket.on('all-tokens-selected', () => {
                console.log('All tokens selected');
                allTokensSelected = true;
                showStartGameButton();
            });

            socket.on('game-started', (data) => {
                console.log('Game started:', data);
                showStatus('Game is starting...', 'success');
                
                // Redirect to game
                setTimeout(() => {
                    window.location.href = `game.html?roomId=${currentRoomId}&playerName=${encodeURIComponent(currentPlayerName)}`;
                }, 2000);
            });

            socket.on('error', (error) => {
                console.error('Server error:', error);
                showStatus(error.message, 'error');
                hideLoading();
            });

            socket.on('player-joined', (player) => {
                console.log('Player joined:', player);
                addChatMessage('System', `${player.name} joined the game`);
                updatePlayersDisplay();
            });

            socket.on('player-left', (player) => {
                console.log('Player left:', player);
                addChatMessage('System', `${player.name} left the game`);
                updatePlayersDisplay();
            });

            socket.on('chat-message', (data) => {
                addChatMessage(data.playerName, data.message);
            });

            socket.on('lobby-updated', (lobby) => {
                console.log('Lobby updated:', lobby);
                updateLobbyInfo(lobby);
            });
        }

        function updatePlayersDisplay() {
            const playersGrid = document.getElementById('players-grid');
            
            if (players.length === 0) {
                playersGrid.innerHTML = '<div class="status-message status-info">No players yet</div>';
                return;
            }

            playersGrid.innerHTML = players.map(player => `
                <div class="player-card ${player.token ? 'ready' : 'waiting'}">
                    <div class="player-name">${player.name}</div>
                    <div class="player-status">
                        ${player.token ? `Token: ${player.token}` : 'Selecting token...'}
                    </div>
                    ${player.isHost ? '<div style="color: #667eea; font-weight: bold;">👑 Host</div>' : ''}
                </div>
            `).join('');

            document.getElementById('player-count').textContent = `${players.length}/8`;
        }

        function updateLobbyInfo(lobby) {
            document.getElementById('player-count').textContent = `${lobby.playerCount}/8`;
        }

        function showTokenSelection() {
            document.getElementById('token-selection').classList.remove('hidden');
        }

        function selectToken(token) {
            // Check if token is already taken
            const tokenTaken = players.some(player => player.token === token);
            if (tokenTaken) {
                showStatus('Token already taken', 'error');
                return;
            }

            selectedToken = token;
            
            // Update UI
            document.querySelectorAll('.token-option').forEach(option => {
                option.classList.remove('selected');
                if (option.dataset.token === token) {
                    option.classList.add('selected');
                }
            });

            // Send to server
            socket.emit('select-token', { token: token });
        }

        function updateTokenSelection(playerId, token) {
            // Update token options UI
            document.querySelectorAll('.token-option').forEach(option => {
                if (option.dataset.token === token) {
                    option.classList.add('taken');
                    option.classList.remove('selected');
                }
            });

            // Update players array
            const player = players.find(p => p.id === playerId);
            if (player) {
                player.token = token;
            }
        }

        function showStartGameButton() {
            const startBtn = document.getElementById('start-game-btn');
            const beginBtn = document.getElementById('begin-game-btn');
            
            // Check if current player is host
            const currentPlayer = players.find(p => p.name === currentPlayerName);
            isHost = currentPlayer && currentPlayer.isHost;

            if (isHost) {
                beginBtn.classList.remove('hidden');
            } else {
                startBtn.classList.remove('hidden');
            }
        }

        function startGame() {
            showLoading('start');
            socket.emit('start-game', {});
        }

        function beginGame() {
            showLoading('begin');
            socket.emit('begin-game', {});
        }

        function leaveRoom() {
            if (confirm('Are you sure you want to leave the room?')) {
                window.location.href = 'lobby.html';
            }
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(currentRoomId).then(() => {
                showStatus('Room code copied to clipboard!', 'success');
            }).catch(() => {
                showStatus('Failed to copy room code', 'error');
            });
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (message) {
                socket.emit('chat-message', { message: message });
                input.value = '';
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function addChatMessage(sender, message) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${message}`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 5000);
        }

        function showLoading(type) {
            const btn = document.getElementById(`${type}-game-btn`);
            const btnText = document.getElementById(`${type}-btn-text`);
            const loading = document.getElementById(`${type}-loading`);
            
            btn.disabled = true;
            btnText.style.display = 'none';
            loading.classList.remove('hidden');
        }

        function hideLoading() {
            const btns = ['start', 'begin'];
            btns.forEach(type => {
                const btn = document.getElementById(`${type}-game-btn`);
                const btnText = document.getElementById(`${type}-btn-text`);
                const loading = document.getElementById(`${type}-loading`);
                
                if (btn) {
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    loading.classList.add('hidden');
                }
            });
        }

        // Handle page visibility changes for reconnection
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && socket && !socket.connected) {
                console.log('Page became visible, attempting to reconnect...');
                socket.connect();
            }
        });

        // Handle beforeunload to notify server
        window.addEventListener('beforeunload', function() {
            if (socket) {
                socket.disconnect();
            }
        });
    </script>
</body>
</html>
