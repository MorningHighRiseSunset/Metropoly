<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropoly - Multiplayer Lobby</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lobby-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .lobby-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .lobby-title {
            font-size: 3em;
            color: #333;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .lobby-subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }

        .lobby-tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: #f0f0f0;
            color: #666;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background: #667eea;
            color: white;
        }

        .tab-button:hover:not(.active) {
            background: #e0e0e0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .lobby-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }

        .lobby-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .lobby-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .lobby-info {
            flex: 1;
        }

        .lobby-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .lobby-details {
            font-size: 0.9em;
            color: #666;
        }

        .lobby-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9em;
            border-radius: 5px;
        }

        .status-message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .player-count {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .refresh-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #667eea;
            margin-left: 10px;
        }

        .refresh-btn:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="lobby-container">
        <div class="lobby-header">
            <h1 class="lobby-title">Metropoly</h1>
            <p class="lobby-subtitle">Multiplayer Monopoly Game</p>
        </div>

        <div class="lobby-tabs">
            <button class="tab-button active" onclick="showTab('create')">Create Game</button>
            <button class="tab-button" onclick="showTab('join')">Join Game</button>
        </div>

        <!-- Create Game Tab -->
        <div id="create-tab" class="tab-content active">
            <form id="create-form">
                <div class="form-group">
                    <label class="form-label" for="player-name">Your Name</label>
                    <input type="text" id="player-name" class="form-input" placeholder="Enter your name" required>
                </div>
                <button type="submit" class="btn btn-primary" id="create-btn">
                    <span id="create-btn-text">Create New Game</span>
                    <span id="create-loading" class="loading hidden"></span>
                </button>
            </form>
        </div>

        <!-- Join Game Tab -->
        <div id="join-tab" class="tab-content">
            <div class="form-group">
                <label class="form-label">Available Games</label>
                <button class="refresh-btn" onclick="refreshLobbies()" title="Refresh lobbies">🔄</button>
            </div>
            <div id="lobby-list" class="lobby-list">
                <div class="status-message status-info">
                    Loading available games...
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="join-room-id">Or enter room code directly:</label>
                <input type="text" id="join-room-id" class="form-input" placeholder="Enter room code (e.g., ABC123)" maxlength="6">
                <button type="button" class="btn btn-primary" onclick="joinByCode()">Join by Code</button>
            </div>
        </div>

        <div id="status-message"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // Configuration
        const SERVER_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://metropoly-backend.onrender.com';

        // Global variables
        let socket = null;
        let currentPlayerName = '';
        let currentRoomId = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeSocket();
            loadLobbies();
        });

        function initializeSocket() {
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                console.log('Connected to server');
                showStatus('Connected to server', 'success');
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                showStatus('Disconnected from server', 'error');
            });

            socket.on('lobby-created', (lobby) => {
                console.log('Lobby created:', lobby);
                currentRoomId = lobby.roomId;
                showStatus(`Game created! Room code: ${lobby.roomId}`, 'success');
                
                // Redirect to room selection page
                setTimeout(() => {
                    window.location.href = `room.html?roomId=${lobby.roomId}&playerName=${encodeURIComponent(currentPlayerName)}`;
                }, 2000);
            });

            socket.on('lobby-joined', (lobby) => {
                console.log('Joined lobby:', lobby);
                currentRoomId = lobby.roomId;
                showStatus(`Joined game! Room code: ${lobby.roomId}`, 'success');
                
                // Redirect to room selection page
                setTimeout(() => {
                    window.location.href = `room.html?roomId=${lobby.roomId}&playerName=${encodeURIComponent(currentPlayerName)}`;
                }, 2000);
            });

            socket.on('error', (error) => {
                console.error('Server error:', error);
                showStatus(error.message, 'error');
                hideLoading();
            });

            socket.on('player-joined', (player) => {
                console.log('Player joined:', player);
                showStatus(`${player.name} joined the game`, 'info');
            });

            socket.on('lobby-updated', (lobby) => {
                console.log('Lobby updated:', lobby);
                updateLobbyDisplay(lobby);
            });
        }

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');

            // Load lobbies if joining tab
            if (tabName === 'join') {
                loadLobbies();
            }
        }

        // Create Game Form
        document.getElementById('create-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const playerName = document.getElementById('player-name').value.trim();
            if (!playerName) {
                showStatus('Please enter your name', 'error');
                return;
            }

            currentPlayerName = playerName;
            showLoading('create');
            
            socket.emit('create-lobby', {
                playerName: playerName
            });
        });

        // Join Game Functions
        async function loadLobbies() {
            try {
                const response = await fetch(`${SERVER_URL}/api/lobbies`);
                const lobbies = await response.json();
                displayLobbies(lobbies);
            } catch (error) {
                console.error('Error loading lobbies:', error);
                document.getElementById('lobby-list').innerHTML = 
                    '<div class="status-message status-error">Failed to load games</div>';
            }
        }

        function displayLobbies(lobbies) {
            const lobbyList = document.getElementById('lobby-list');
            
            if (lobbies.length === 0) {
                lobbyList.innerHTML = '<div class="status-message status-info">No games available. Create one!</div>';
                return;
            }

            lobbyList.innerHTML = lobbies.map(lobby => `
                <div class="lobby-item">
                    <div class="lobby-info">
                        <div class="lobby-name">
                            ${lobby.hostName}'s Game
                            <span class="player-count">${lobby.playerCount}/${lobby.maxPlayers}</span>
                        </div>
                        <div class="lobby-details">
                            Room: ${lobby.roomId} • Created ${formatTime(lobby.createdAt)}
                        </div>
                    </div>
                    <div class="lobby-actions">
                        <button class="btn btn-small btn-primary" onclick="joinLobby('${lobby.roomId}')">
                            Join
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function joinLobby(roomId) {
            const playerName = prompt('Enter your name:');
            if (!playerName || playerName.trim() === '') {
                return;
            }

            currentPlayerName = playerName.trim();
            showLoading('join');
            
            socket.emit('join-lobby', {
                roomId: roomId,
                playerName: currentPlayerName
            });
        }

        function joinByCode() {
            const roomId = document.getElementById('join-room-id').value.trim().toUpperCase();
            if (!roomId) {
                showStatus('Please enter a room code', 'error');
                return;
            }

            const playerName = prompt('Enter your name:');
            if (!playerName || playerName.trim() === '') {
                return;
            }

            currentPlayerName = playerName.trim();
            showLoading('join');
            
            socket.emit('join-lobby', {
                roomId: roomId,
                playerName: currentPlayerName
            });
        }

        function refreshLobbies() {
            loadLobbies();
        }

        function updateLobbyDisplay(lobby) {
            // Update the specific lobby in the list
            const lobbyItems = document.querySelectorAll('.lobby-item');
            lobbyItems.forEach(item => {
                const roomIdElement = item.querySelector('.lobby-details');
                if (roomIdElement && roomIdElement.textContent.includes(lobby.roomId)) {
                    const playerCount = item.querySelector('.player-count');
                    if (playerCount) {
                        playerCount.textContent = `${lobby.playerCount}/${lobby.maxPlayers}`;
                    }
                }
            });
        }

        // Utility Functions
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
            
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 5000);
        }

        function showLoading(type) {
            const btn = document.getElementById(`${type}-btn`);
            const btnText = document.getElementById(`${type}-btn-text`);
            const loading = document.getElementById(`${type}-loading`);
            
            btn.disabled = true;
            btnText.style.display = 'none';
            loading.classList.remove('hidden');
        }

        function hideLoading() {
            const btns = ['create', 'join'];
            btns.forEach(type => {
                const btn = document.getElementById(`${type}-btn`);
                const btnText = document.getElementById(`${type}-btn-text`);
                const loading = document.getElementById(`${type}-loading`);
                
                if (btn) {
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    loading.classList.add('hidden');
                }
            });
        }

        function formatTime(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            
            if (minutes < 1) return 'Just now';
            if (minutes === 1) return '1 minute ago';
            if (minutes < 60) return `${minutes} minutes ago`;
            
            const hours = Math.floor(minutes / 60);
            if (hours === 1) return '1 hour ago';
            return `${hours} hours ago`;
        }

        // Handle page visibility changes for reconnection
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && socket && !socket.connected) {
                console.log('Page became visible, attempting to reconnect...');
                socket.connect();
            }
        });

        // Handle beforeunload to notify server
        window.addEventListener('beforeunload', function() {
            if (socket) {
                socket.disconnect();
            }
        });
    </script>
</body>
</html>
